<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>賴柏延 & 馬琳｜婚禮邀請</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5efe6;
  --ink:#2b2b2b;
  --muted:#6b6259;
  --card:#ffffff;
  --accent:#b23a3a;
  --line:rgba(0,0,0,.08);
  --shadow:0 10px 30px rgba(0,0,0,.08);
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  margin:0;
  font-family:"Noto Serif TC", serif;
  background:
    linear-gradient(rgba(255,255,255,.45), rgba(255,255,255,.18)),
    repeating-linear-gradient(
      0deg,
      rgba(120,100,80,.02) 0px,
      rgba(120,100,80,.02) 1px,
      transparent 1px,
      transparent 7px
    ),
    var(--bg);
  color:var(--ink);
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.hero{
  position:relative;
  border-radius:30px;
  overflow:hidden;
  min-height:clamp(420px,60vw,760px);
  margin-bottom:20px;
  box-shadow:var(--shadow);
  background:linear-gradient(135deg,#f7efe4 0%,#f1e3d2 100%);
  isolation:isolate;
}

.hero::before{
  content:"";
  position:absolute;
  inset:10px;
  border-radius:24px;
  border:1px solid rgba(0,0,0,.08);
  z-index:0;
}

.hero::after{
  content:"";
  position:absolute;
  inset:30px;
  border-radius:20px;
  background-image:
    linear-gradient(rgba(255,255,255,.28), rgba(255,255,255,.10)),
    url("./bg_scene.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  z-index:0;
}

.hero-content{
  position:relative;
  z-index:2;
  text-align:center;
  padding: clamp(60px, 10vw, 110px) 20px 30px;
}

.hero h1{
  font-size:clamp(30px,5vw,54px);
  margin:0;
  line-height:1.15;
}

.hero p{
  color:var(--muted);
  margin:10px 0 0;
  font-size:clamp(14px,2.2vw,18px);
}

/* 倒數計時 */
.countdown-wrap{
  position:relative;
  z-index:2;
  margin-top:22px;
  display:flex;
  justify-content:center;
}

.countdown{
  display:grid;
  grid-template-columns:repeat(4, minmax(68px, 110px));
  gap:12px;
  width:min(100%, 520px);
}

.count-item{
  background:rgba(255,255,255,.72);
  border:1px solid rgba(0,0,0,.06);
  border-radius:18px;
  padding:14px 8px;
  box-shadow:0 6px 18px rgba(0,0,0,.04);
  backdrop-filter: blur(6px);
}

.count-num{
  font-size:clamp(24px,4vw,36px);
  font-weight:700;
  line-height:1;
}

.count-label{
  margin-top:8px;
  font-size:12px;
  color:var(--muted);
  letter-spacing:.08em;
}

.card{
  background:var(--card);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 8px 20px rgba(0,0,0,.05);
  border:1px solid var(--line);
}

.card h2{
  margin-top:0;
  margin-bottom:12px;
  font-size:clamp(22px,3vw,30px);
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:12px 16px;
  background:var(--accent);
  color:white;
  border-radius:12px;
  margin-top:10px;
  border:none;
  cursor:pointer;
}

.btn.secondary{
  background:#fff;
  color:var(--accent);
  border:1px solid rgba(178,58,58,.25);
}

.rsvp-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.form-embed{
  margin-top:14px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--line);
}

.form-embed iframe{
  width:100%;
  height:520px;
  border:0;
  display:block;
  background:#fff;
}

/* IG 風格輪播 */
.carousel-shell{
  position:relative;
}

.carousel{
  display:flex;
  gap:12px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
  padding-bottom:8px;
}

.carousel::-webkit-scrollbar{
  height:10px;
}
.carousel::-webkit-scrollbar-thumb{
  background:rgba(0,0,0,.15);
  border-radius:999px;
}

.slide{
  flex:0 0 min(78vw, 320px);
  scroll-snap-align:center;
  border-radius:20px;
  overflow:hidden;
  border:1px solid var(--line);
  background:#f7f3ed;
  box-shadow:0 8px 20px rgba(0,0,0,.05);
}

.slide img{
  width:100%;
  aspect-ratio:4/5;
  object-fit:cover;
  display:block;
}

.slide-caption{
  padding:10px 12px 12px;
  color:var(--muted);
  font-size:14px;
}

.carousel-nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-top:12px;
}

.carousel-buttons{
  display:flex;
  gap:10px;
}

.dotbar{
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}

.dot{
  width:9px;
  height:9px;
  border-radius:999px;
  background:rgba(0,0,0,.18);
  transition:transform .2s ease, background .2s ease;
}

.dot.active{
  background:var(--accent);
  transform:scale(1.2);
}

/* 地圖 */
.map iframe{
  width:100%;
  height:400px;
  border:0;
  border-radius:12px;
}

/* 進場動畫 */
.reveal{
  opacity:0;
  transform:translateY(34px) scale(.985);
  transition:
    opacity .8s ease,
    transform .8s cubic-bezier(.22,1,.36,1);
  will-change:opacity, transform;
}

.reveal.in-view{
  opacity:1;
  transform:translateY(0) scale(1);
}

.reveal-left{
  transform:translateX(-34px);
}
.reveal-right{
  transform:translateX(34px);
}
.reveal-left.in-view,
.reveal-right.in-view{
  transform:translateX(0);
}

.reveal-delay-1{transition-delay:.08s}
.reveal-delay-2{transition-delay:.16s}
.reveal-delay-3{transition-delay:.24s}

footer{
  color:var(--muted);
  padding:8px 4px 20px;
  text-align:center;
}

/* 手機版 */
@media (max-width:700px){
  .hero::after{ inset:18px; }
  .hero::before{ inset:8px; }
  .countdown{
    grid-template-columns:repeat(2, minmax(80px, 1fr));
    max-width:280px;
  }
  .form-embed iframe{
    height:620px;
  }
  .slide{
    flex:0 0 78vw;
  }
}
</style>
</head>

<body>

<div class="wrap">

  <!-- 主視覺 -->
  <section class="hero reveal">
    <div class="hero-content">
      <h1>賴柏延 & 馬琳</h1>
      <p>2026 / 05 / 30</p>
      <p>我們要結婚了 ❤️</p>

      <!-- 倒數計時 -->
      <div class="countdown-wrap">
        <div class="countdown" id="countdown">
          <div class="count-item">
            <div class="count-num" id="days">--</div>
            <div class="count-label">天</div>
          </div>
          <div class="count-item">
            <div class="count-num" id="hours">--</div>
            <div class="count-label">時</div>
          </div>
          <div class="count-item">
            <div class="count-num" id="minutes">--</div>
            <div class="count-label">分</div>
          </div>
          <div class="count-item">
            <div class="count-num" id="seconds">--</div>
            <div class="count-label">秒</div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- 婚禮資訊 -->
  <section class="card reveal reveal-left">
    <h2>婚禮資訊</h2>
    <p>📍 台中旌旗教會</p>
    <p>📅 2026 / 05 / 30</p>
    <p>👰 新娘：馬琳　🤵 新郎：賴柏延</p>
  </section>

  <!-- RSVP -->
  <section class="card reveal reveal-right">
    <h2>出席回覆</h2>
    <p>請將下方兩個位置替換成你的 Google 表單網址：</p>
    <ul>
      <li><code>FORM_VIEW_URL</code>：表單公開連結</li>
      <li><code>FORM_EMBED_URL</code>：表單嵌入連結</li>
    </ul>

    <div class="rsvp-actions">
      <a class="btn" href="FORM_VIEW_URL" target="_blank" rel="noopener">填寫出席表單</a>
      <a class="btn secondary" href="https://docs.google.com/forms/" target="_blank" rel="noopener">前往 Google Forms</a>
    </div>

    <div class="form-embed">
      <iframe src="FORM_EMBED_URL" title="Google 表單 RSVP" loading="lazy"></iframe>
    </div>
  </section>

  <!-- 照片輪播 -->
  <section class="card reveal">
    <h2>我們的照片</h2>

    <div class="carousel-shell">
      <div class="carousel" id="photoCarousel">
        <div class="slide">
          <img src="./Fig1.png" alt="Fig1">
          <div class="slide-caption">Fig.01</div>
        </div>
        <div class="slide">
          <img src="./Fig2.png" alt="Fig2">
          <div class="slide-caption">Fig.02</div>
        </div>
        <div class="slide">
          <img src="./Fig3.png" alt="Fig3">
          <div class="slide-caption">Fig.03</div>
        </div>
        <div class="slide">
          <img src="./Fig4.png" alt="Fig4">
          <div class="slide-caption">Fig.04</div>
        </div>
        <div class="slide">
          <img src="./Fig5.png" alt="Fig5">
          <div class="slide-caption">Fig.05</div>
        </div>
      </div>

      <div class="carousel-nav">
        <div class="dotbar" id="dotbar">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>

        <div class="carousel-buttons">
          <button class="btn secondary small" id="prevBtn" type="button">← 上一張</button>
          <button class="btn secondary small" id="nextBtn" type="button">下一張 →</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 地圖 -->
  <section class="card map reveal">
    <h2>地圖</h2>
    <iframe
      src="https://www.google.com/maps?q=台中旌旗教會&output=embed"
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
    <a class="btn" href="https://www.google.com/maps/search/?api=1&query=%E5%8F%B0%E4%B8%AD%E6%97%8C%E6%97%97%E6%95%99%E6%9C%83" target="_blank" rel="noopener">開啟 Google Maps 導航</a>
  </section>

  <footer class="reveal">
    © 2026 賴柏延 & 馬琳
  </footer>
</div>

<script>
/* ===== 倒數計時 ===== */
const weddingDate = new Date("2026-05-30T00:00:00+08:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const distance = weddingDate - now;

  const daysEl = document.getElementById("days");
  const hoursEl = document.getElementById("hours");
  const minutesEl = document.getElementById("minutes");
  const secondsEl = document.getElementById("seconds");

  if (distance <= 0) {
    daysEl.textContent = "0";
    hoursEl.textContent = "0";
    minutesEl.textContent = "0";
    secondsEl.textContent = "0";
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((distance / (1000 * 60)) % 60);
  const seconds = Math.floor((distance / 1000) % 60);

  daysEl.textContent = days;
  hoursEl.textContent = String(hours).padStart(2, "0");
  minutesEl.textContent = String(minutes).padStart(2, "0");
  secondsEl.textContent = String(seconds).padStart(2, "0");
}
updateCountdown();
setInterval(updateCountdown, 1000);

/* ===== 進場動畫 ===== */
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("in-view");
    }
  });
}, {
  threshold: 0.16
});

document.querySelectorAll(".reveal").forEach(el => observer.observe(el));

/* ===== 照片輪播 ===== */
const carousel = document.getElementById("photoCarousel");
const slides = Array.from(carousel.querySelectorAll(".slide"));
const dots = Array.from(document.querySelectorAll(".dot"));
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

let currentIndex = 0;

function goToSlide(index) {
  currentIndex = Math.max(0, Math.min(index, slides.length - 1));
  slides[currentIndex].scrollIntoView({
    behavior: "smooth",
    inline: "center",
    block: "nearest"
  });
  updateDots();
}

function updateDots() {
  dots.forEach((dot, i) => {
    dot.classList.toggle("active", i === currentIndex);
  });
}

prevBtn.addEventListener("click", () => goToSlide(currentIndex - 1));
nextBtn.addEventListener("click", () => goToSlide(currentIndex + 1));

carousel.addEventListener("scroll", () => {
  let closestIndex = 0;
  let closestDistance = Infinity;

  slides.forEach((slide, i) => {
    const distance = Math.abs(slide.getBoundingClientRect().left - carousel.getBoundingClientRect().left - 20);
    if (distance < closestDistance) {
      closestDistance = distance;
      closestIndex = i;
    }
  });

  currentIndex = closestIndex;
  updateDots();
});

dots.forEach((dot, i) => {
  dot.addEventListener("click", () => goToSlide(i));
});
</script>

</body>
</html>
