<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>賴柏延 & 馬琳｜婚禮邀請</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5efe6;
  --ink:#2b2b2b;
  --muted:#6b6259;
  --card:#ffffff;
  --accent:#b23a3a;
}

body{
  margin:0;
  font-family:"Noto Serif TC", serif;
  background:var(--bg);
  color:var(--ink);
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* 主視覺 */
.hero{
  border-radius:30px;
  overflow:hidden;
  min-height:500px;
  margin-bottom:20px;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  inset:20px;
  border-radius:20px;
  background:
    linear-gradient(rgba(255,255,255,.2), rgba(255,255,255,.1)),
    url("./bg_scene.png");
  background-size:cover;
  background-position:center;
}

.hero-content{
  position:relative;
  z-index:2;
  text-align:center;
  padding-top:100px;
}

.hero h1{font-size:48px;margin:0;}
.hero p{color:var(--muted);}

/* 卡片 */
.card{
  background:#fff;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

/* ===== 美化表單 ===== */
.form-wrapper{
  position:relative;
  border-radius:20px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* 上方假標題（讓它像自己設計） */
.form-header{
  padding:16px;
  border-bottom:1px solid #eee;
  background:#faf6ef;
  font-weight:600;
}

/* iframe 包裝 */
.form-iframe{
  position:relative;
}

.form-iframe iframe{
  width:100%;
  height:900px;
  border:0;
  filter:contrast(0.98) saturate(0.95);
}

/* 模擬覆蓋 Google 頂部 */
.form-mask{
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:80px;
  background:#faf6ef;
  z-index:2;
}

/* 輪播 */
.carousel{
  display:flex;
  overflow-x:auto;
  gap:10px;
}
.carousel img{
  width:80%;
  border-radius:12px;
}

/* 倒數 */
.countdown{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}
.count{
  background:#fff;
  padding:10px;
  border-radius:10px;
}

/* 動畫 */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:.8s;
}
.reveal.show{
  opacity:1;
  transform:translateY(0);
}

/* 手機 */
@media(max-width:600px){
  .hero h1{font-size:32px;}
  .form-iframe iframe{height:1000px;}
}
</style>
</head>

<body>

<div class="wrap">

<!-- 主視覺 -->
<section class="hero reveal">
  <div class="hero-content">
    <h1>賴柏延 & 馬琳</h1>
    <p>2026 / 05 / 30</p>

    <!-- 倒數 -->
    <div class="countdown">
      <div class="count" id="d"></div>
      <div class="count" id="h"></div>
      <div class="count" id="m"></div>
      <div class="count" id="s"></div>
    </div>
  </div>
</section>

<!-- 表單 -->
<div class="card reveal">
  <h2>出席回覆 RSVP</h2>

  <div class="form-wrapper">
    <div class="form-header">
      ✦ 婚禮出席回覆 ✦
    </div>

    <div class="form-iframe">
      <div class="form-mask"></div>

      <iframe 
      src="https://docs.google.com/forms/d/e/1FAIpQLSfpaHthGVwhbTOL5Mkcuieyn3Uhq9RFL0IhNTYcCyr4BWatzQ/viewform?embedded=true">
      </iframe>
    </div>
  </div>
</div>

<!-- 照片 -->
<div class="card reveal">
  <h2>照片</h2>
  <div class="carousel">
    <img src="Fig1.png">
    <img src="Fig2.png">
    <img src="Fig3.png">
    <img src="Fig4.png">
    <img src="Fig5.png">
  </div>
</div>

<!-- 地圖 -->
<div class="card reveal">
  <h2>地圖</h2>
  <iframe src="https://www.google.com/maps?q=台中旌旗教會&output=embed" width="100%" height="400"></iframe>
</div>

</div>

<script>
/* 倒數 */
const target = new Date("2026-05-30").getTime();
setInterval(()=>{
  const now = new Date().getTime();
  const t = target - now;

  document.getElementById("d").innerText = Math.floor(t/(1000*60*60*24))+"天";
  document.getElementById("h").innerText = Math.floor((t/(1000*60*60))%24)+"時";
  document.getElementById("m").innerText = Math.floor((t/(1000*60))%60)+"分";
  document.getElementById("s").innerText = Math.floor((t/1000)%60)+"秒";
},1000);

/* 動畫 */
const obs = new IntersectionObserver(e=>{
  e.forEach(i=>{
    if(i.isIntersecting) i.target.classList.add("show");
  });
});
document.querySelectorAll(".reveal").forEach(el=>obs.observe(el));
</script>

</body>
</html>
